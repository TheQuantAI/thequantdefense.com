<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#6D28D9"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
  </defs>
  <!-- Shield outline -->
  <path d="M256,56 L432,140 L432,280 C432,380,356,460,256,480 C156,460,80,380,80,280 L80,140 Z" fill="url(#shieldGrad)" opacity="0.9"/>
  <!-- Inner shield border -->
  <path d="M256,80 L412,155 L412,278 C412,368,344,440,256,458 C168,440,100,368,100,278 L100,155 Z" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  <!-- Quantum lock symbol -->
  <rect x="216" y="260" width="80" height="60" rx="8" fill="url(#lockGrad)"/>
  <path d="M230,260 L230,230 A26,26,0,0,1,282,230 L282,260" fill="none" stroke="url(#lockGrad)" stroke-width="8" stroke-linecap="round"/>
  <!-- Keyhole (quantum dot) -->
  <circle cx="256" cy="283" r="10" fill="#7C3AED"/>
  <rect x="253" y="288" width="6" height="16" rx="2" fill="#7C3AED"/>
  <!-- Orbital rings around the lock -->
  <ellipse cx="256" cy="270" rx="90" ry="35" fill="none" stroke="white" stroke-width="2" opacity="0.3" transform="rotate(-20,256,270)"/>
  <ellipse cx="256" cy="270" rx="90" ry="35" fill="none" stroke="white" stroke-width="2" opacity="0.3" transform="rotate(20,256,270)"/>
  <!-- Quantum particles on orbits -->
  <circle cx="186" cy="240" r="6" fill="white" opacity="0.8"/>
  <circle cx="326" cy="300" r="6" fill="white" opacity="0.8"/>
  <circle cx="320" cy="235" r="5" fill="white" opacity="0.6"/>
  <!-- Stars / security indicators -->
  <circle cx="256" cy="170" r="4" fill="white" opacity="0.6"/>
  <circle cx="230" cy="185" r="3" fill="white" opacity="0.4"/>
  <circle cx="282" cy="185" r="3" fill="white" opacity="0.4"/>
</svg>
